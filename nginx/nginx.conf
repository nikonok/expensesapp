worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # $remote_addr is rewritten to the real client IP by set_real_ip_from above.
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server_tokens off;  # hide nginx version from error pages and headers

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 16k;

    # Real IP extraction — nginx only sees the cloudflared container's Docker IP,
    # not the actual client IP. Cloudflare forwards the real IP in CF-Connecting-IP.
    # We trust the entire Docker bridge range (172.16/12, 192.168/16) since only
    # cloudflared can reach nginx (no public ports). After this, $remote_addr and
    # $binary_remote_addr reflect the real client IP throughout this config.
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header   CF-Connecting-IP;

    # Rate limiting — secondary defense behind Cloudflare (30 req/min per real client IP)
    limit_req_zone $binary_remote_addr zone=app:10m rate=30r/m;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/manifest+json
        image/svg+xml;

    server {
        listen 80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        limit_req zone=app burst=10 nodelay;
        limit_req_status 429;

        # ── Security headers ─────────────────────────────────────────────────
        # NOTE: nginx's add_header does NOT inherit into nested location blocks
        # that define their own add_header. Each location below repeats the
        # critical security headers to ensure they are always sent.
        add_header X-Content-Type-Options  "nosniff"          always;
        add_header X-Frame-Options         "DENY"             always;
        add_header X-XSS-Protection        "1; mode=block"    always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "geolocation=(), microphone=(), camera=(), payment=()" always;
        # HSTS: tell browsers to use HTTPS for 1 year (Cloudflare handles the actual TLS).
        # includeSubDomains is intentionally omitted — add it only once all subdomains serve HTTPS.
        add_header Strict-Transport-Security "max-age=31536000" always;
        # Cross-origin isolation headers (Spectre mitigation — important for a finance PWA with IndexedDB).
        add_header Cross-Origin-Opener-Policy   "same-origin"  always;
        add_header Cross-Origin-Resource-Policy "same-origin"  always;
        # CSP: production Vite build has no inline scripts (all code is in /assets/ bundles),
        # so 'unsafe-inline' is omitted from script-src. Inline styles are kept because React
        # components use style={{}} at runtime. Google Fonts and the exchange-rate API are
        # explicitly allowed. frame-ancestors duplicates X-Frame-Options for modern browsers.
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://open.er-api.com; worker-src 'self'; manifest-src 'self'; form-action 'none'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'" always;

        # ── Service worker files: must never be browser-cached ───────────────
        # sw.js, registerSW.js, and workbox-<hash>.js are all service worker
        # files. They MUST be re-fetched on every page load so that
        # vite-plugin-pwa's autoUpdate can detect new versions. Any positive
        # max-age here would silently break PWA updates.
        location ~* ^/(sw\.js|registerSW\.js|workbox-[^/]+\.js)$ {
            add_header Cache-Control       "no-cache, no-store, must-revalidate" always;
            add_header Pragma              "no-cache"                            always;
            add_header Expires             "0"                                   always;
            add_header X-Content-Type-Options "nosniff"                         always;
        }

        # ── PWA manifest: always re-validate ─────────────────────────────────
        location = /manifest.webmanifest {
            add_header Cache-Control       "no-cache, no-store, must-revalidate" always;
            add_header Pragma              "no-cache"                            always;
            add_header Expires             "0"                                   always;
            add_header Content-Type        "application/manifest+json"           always;
            add_header X-Content-Type-Options "nosniff"                         always;
        }

        # ── Hashed assets: immutable long-cache ──────────────────────────────
        # Vite writes all JS/CSS chunks to /assets/ with content hashes in the
        # filename (e.g. index-cihrxFqD.js). Any content change produces a new
        # hash → new filename, so max-age=1year + immutable is safe here.
        location /assets/ {
            add_header Cache-Control       "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff"                         always;
        }

        # ── App icons: short cache (filenames are not hashed) ────────────────
        location /icons/ {
            add_header Cache-Control         "public, max-age=86400" always;
            add_header X-Content-Type-Options "nosniff"              always;
        }

        # ── index.html: never cache ───────────────────────────────────────────
        location = /index.html {
            add_header Cache-Control       "no-cache, no-store, must-revalidate" always;
            add_header Pragma              "no-cache"                            always;
            add_header Expires             "0"                                   always;
            add_header X-Content-Type-Options "nosniff"                         always;
        }

        # ── Hidden files: deny access ────────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── SPA catch-all ────────────────────────────────────────────────────
        # Any path that does not match a real file is served as index.html with
        # HTTP 200 so React Router handles routing client-side.
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control       "no-cache, no-store, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff"                         always;
        }
    }
}
