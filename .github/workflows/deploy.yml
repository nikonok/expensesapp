name: Deploy to Server

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # cloudflared access ssh reads TUNNEL_SERVICE_TOKEN_ID / TUNNEL_SERVICE_TOKEN_SECRET
      # (not CF_ACCESS_CLIENT_ID / CF_ACCESS_CLIENT_SECRET — those are for backend apps only)
      TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

    steps:
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Install cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Route SSH connections through the Cloudflare tunnel.
          # Pass service token credentials explicitly via --id/--secret flags so the
          # ProxyCommand works regardless of how cloudflared resolves env vars.
          cat >> ~/.ssh/config << 'EOF'
          Host ${{ secrets.SSH_HOST }}
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            ProxyCommand cloudflared access ssh --hostname %h --id $TUNNEL_SERVICE_TOKEN_ID --secret $TUNNEL_SERVICE_TOKEN_SECRET
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config
          # Write the pre-recorded server host key.
          # ssh-keyscan cannot reach the server (no public IP), so the key is stored
          # in a GitHub Secret and written here instead.
          echo "${{ secrets.SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts

      - name: Write .env to server
        # Pipe the token via stdin so it never appears in the remote command string.
        # printf runs locally; 'cat > file' runs remotely — no shell injection risk.
        run: |
          printf 'CLOUDFLARE_TUNNEL_TOKEN=%s\n' '${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}' | \
            ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "cat > ${{ secrets.APP_DIR }}/.env && chmod 600 ${{ secrets.APP_DIR }}/.env"

      - name: Pull, build, and restart
        # docker compose commands use -f with the absolute path to match the
        # sudoers rules on the server (which restrict the deploy user to this
        # specific compose file only).
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -euo pipefail
            COMPOSE="sudo docker compose -f ${{ secrets.APP_DIR }}/docker-compose.yml"
            git -C "${{ secrets.APP_DIR }}" pull origin main
            $COMPOSE build --no-cache
            $COMPOSE up -d
            $COMPOSE ps
          ENDSSH
